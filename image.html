<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Images</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h1 class="mb-4">Bootstrap Images</h1>

    <p>
        Bootstrap provides classes to style images and make them responsive.
    </p>

    <hr>

    <!-- Rounded Image -->

    <h3>1. Rounded Image (.rounded)</h3>

    <img src="https://picsum.photos/300/200"
         class="rounded"
         alt="Rounded Image">

    <hr>

    <!-- Circle Image -->

    <h3>2. Circle Image (.rounded-circle)</h3>

    <img src="https://picsum.photos/200"
         class="rounded-circle"
         alt="Circle Image">

    <hr>

    <!-- Thumbnail -->

    <h3>3. Thumbnail (.img-thumbnail)</h3>

    <img src="https://picsum.photos/300/200"
         class="img-thumbnail"
         alt="Thumbnail">

    <hr>

    <!-- Responsive Image -->

    <h3>4. Responsive Image (.img-fluid)</h3>

    <img src="https://picsum.photos/800/400"
         class="img-fluid"
         alt="Responsive Image">

    <hr>

    <!-- Image Alignment -->

    <h3>5. Image Alignment</h3>

    <img src="https://picsum.photos/200"
         class="float-start rounded me-3"
         alt="Left">

    <img src="https://picsum.photos/200"
         class="float-end rounded"
         alt="Right">

    <div class="clearfix"></div>

    <hr>

    <!-- Center Image -->

    <h3>6. Center Image</h3>

    <img src="https://picsum.photos/300/200"
         class="d-block mx-auto rounded"
         alt="Centered">

    <hr>

    <!-- Responsive Video -->

    <h3>7. Responsive Embed (16:9)</h3>

    <div class="ratio ratio-16x9">
          <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/5qxXgVcmUfo?si=h6wStBO2kQUERWNW&autoplay=1"
          title="YouTube video player"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen>
          </iframe>
     </div>
</body>
</html>
