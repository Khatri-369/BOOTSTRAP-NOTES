<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOTSTRAP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/media.css" rel="stylesheet" type="text/css">
    <link href="css/style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <h3>1.ROUNDED IMAGE</h3>
    <img src="https://picsum.photos/300/200" class="rounded">
    <hr>
    <h3>2. Circle Image (.rounded-circle)</h3>
    <img src="https://picsum.photos/200"
         class="rounded-circle"
         alt="Circle Image">
    <hr>
    <h3>3. Thumbnail (.img-thumbnail)</h3>
    <img src="https://picsum.photos/300/200"
         class="img-thumbnail"
         alt="Thumbnail">
    <hr>
    <h3>4. Fluid (.img-thumbnail)</h3>
    <img src="https://picsum.photos/800/400"
         class="img-fluid"
         alt="Thumbnail">
    <hr>
    
    <h3>5. Image Alignment</h3>

    <img src="https://picsum.photos/200"
         class="float-start rounded me-3"
         alt="Left">

    <img src="https://picsum.photos/200"
         class="float-end rounded"
         alt="Right">

    <div class="clearfix"></div>

    <h3>6. Center Image</h3>

    <img src="https://picsum.photos/300/200"
         class="d-block mx-auto rounded"
         alt="Centered">

    <hr>

    <hr>
    <h3>7. Responsive Embed (16:9)</h3>
    <div class="ratio ratio-16x9">
         <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/5qxXgVcmUfo?si=h6wStBO2kQUERWNW&autoplay=1"
          title="YouTube video player"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen>
          </iframe>
    </div>
</body>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
